server {
    listen 80;
    server_name localhost;
    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # CSP заголовки для Keycloak iframe
    add_header Content-Security-Policy "frame-ancestors 'self' http://localhost:8080 https://localhost:8080;" always;
    add_header X-Frame-Options "ALLOW-FROM http://localhost:8080" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}